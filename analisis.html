<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis IA — Tutor POO</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ---- TEMA OSCURO (por defecto) ---- */
        :root {
            --bg:        #0a0a0f;
            --bg2:       #111118;
            --bg3:       #18181f;
            --bg4:       #1e1e28;
            --accent:    #7c3aed;
            --accent2:   #a855f7;
            --accent3:   #c084fc;
            --teal:      #06b6d4;
            --green:     #10b981;
            --amber:     #f59e0b;
            --red:       #ef4444;
            --borde:     rgba(255,255,255,0.06);
            --borde2:    rgba(124,58,237,0.3);
            --texto:     #f1f0ff;
            --texto2:    #9ca3af;
            --texto3:    #4b5563;
            --glow:      rgba(124,58,237,0.15);
            --shadow:    rgba(0,0,0,0.4);
        }

        /* ---- TEMA CLARO ---- */
        html.light {
            --bg:        #f5f4ff;
            --bg2:       #ffffff;
            --bg3:       #f0effe;
            --bg4:       #e8e6fd;
            --accent:    #7c3aed;
            --accent2:   #9333ea;
            --accent3:   #6d28d9;
            --teal:      #0891b2;
            --green:     #059669;
            --amber:     #d97706;
            --red:       #dc2626;
            --borde:     rgba(0,0,0,0.08);
            --borde2:    rgba(124,58,237,0.25);
            --texto:     #1a1035;
            --texto2:    #4b5563;
            --texto3:    #9ca3af;
            --glow:      rgba(124,58,237,0.08);
            --shadow:    rgba(0,0,0,0.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--texto);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ---- ANIMACIONES ---- */
        @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideL   { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
        @keyframes glow     { 0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.2)} 50%{box-shadow:0 0 50px rgba(168,85,247,0.4)} }
        @keyframes spin     { to{transform:rotate(360deg)} }
        @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.5} }
        @keyframes barGrow  { from{width:0;opacity:0} to{opacity:1} }
        @keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        @keyframes typeIn   { from{opacity:0;max-height:0} to{opacity:1;max-height:800px} }
        @keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ---- TOPBAR ---- */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px;
            background: var(--bg2);
            border-bottom: 1px solid var(--borde);
            position: sticky; top: 0; z-index: 100;
            animation: fadeUp 0.4s ease both;
            transition: background 0.3s, border-color 0.3s;
        }

        .topbar-left { display: flex; align-items: center; gap: 14px; }

        .logo-mark {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
            color: #fff; animation: glow 3s ease-in-out infinite;
        }

        .topbar-title { font-family: 'Syne', sans-serif; }
        .topbar-title h1 { font-size: 17px; font-weight: 700; }
        .topbar-title p  { font-size: 11px; color: var(--texto2); margin-top: 1px; }

        .topbar-right { display: flex; align-items: center; gap: 10px; }

        .modo-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.35);
            border-radius: 20px; padding: 5px 14px;
            font-size: 12px; font-weight: 600; color: var(--accent3);
        }
        .modo-badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent3); animation: pulse 2s ease-in-out infinite;
        }

        /* ---- BOTÓN TEMA ---- */
        .btn-tema {
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px;
            background: none;
            border: 1px solid var(--borde);
            border-radius: 10px;
            color: var(--texto2);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            flex-shrink: 0;
        }
        .btn-tema:hover {
            border-color: var(--accent2);
            color: var(--accent3);
            background: var(--glow);
            transform: rotate(20deg);
        }
        /* Icono sol (visible en oscuro) y luna (visible en claro) */
        .btn-tema .icon-sun  { display: block; }
        .btn-tema .icon-moon { display: none; }
        html.light .btn-tema .icon-sun  { display: none; }
        html.light .btn-tema .icon-moon { display: block; }

        .btn-back {
            display: flex; align-items: center; gap: 7px;
            background: none; border: 1px solid var(--borde);
            border-radius: 8px; padding: 8px 14px;
            color: var(--texto2); font-size: 13px;
            cursor: pointer; text-decoration: none;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--accent2); color: var(--accent3); background: var(--glow); }

        /* ---- SELECTOR ---- */
        .selector-bar {
            display: flex; gap: 0;
            margin: 28px 32px 24px;
            background: var(--bg3);
            border: 1px solid var(--borde);
            border-radius: 12px; padding: 4px;
            width: fit-content;
            animation: fadeUp 0.4s 0.05s ease both;
            transition: background 0.3s, border-color 0.3s;
        }

        .sel-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 20px; border-radius: 9px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; background: none; border: none;
            color: var(--texto2); font-family: 'DM Sans', sans-serif;
            transition: all 0.25s;
        }
        .sel-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 18px rgba(124,58,237,0.4);
        }
        .sel-btn:hover:not(.active) { color: var(--accent3); background: var(--glow); }

        /* ---- CONTENT ---- */
        .content { padding: 0 32px 40px; }

        /* ---- SECCIÓN ALUMNO SELECTOR ---- */
        .alumno-selector {
            background: var(--bg3);
            border: 1px solid var(--borde);
            border-radius: 14px; padding: 18px 20px;
            margin-bottom: 24px;
            animation: fadeUp 0.45s ease both;
            transition: background 0.3s, border-color 0.3s;
        }

        .alumno-selector label {
            font-size: 12px; font-weight: 600; color: var(--texto2);
            text-transform: uppercase; letter-spacing: 0.5px;
            display: block; margin-bottom: 10px;
        }

        .alumno-selector select {
            width: 100%; max-width: 500px;
            background: var(--bg4); border: 1px solid var(--borde);
            border-radius: 9px; padding: 10px 14px;
            color: var(--texto); font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none; cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
        }
        .alumno-selector select:focus {
            border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow);
        }

        /* ---- ANÁLISIS PANEL ---- */
        .analisis-panel { display: none; }
        .analisis-panel.visible { display: block; animation: fadeUp 0.5s ease both; }

        /* ---- GRID ---- */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .grid-1 { margin-bottom: 24px; }
        @media(max-width: 900px) { .grid-3{grid-template-columns:1fr 1fr} .grid-2{grid-template-columns:1fr} }
        @media(max-width: 600px) { .grid-3{grid-template-columns:1fr} }

        /* ---- KPI CARDS ---- */
        .kpi {
            background: var(--bg3);
            border: 1px solid var(--borde);
            border-radius: 14px; padding: 20px;
            transition: transform 0.25s, border-color 0.2s, box-shadow 0.2s, background 0.3s;
            cursor: default;
        }
        .kpi:hover { transform: translateY(-5px); border-color: var(--borde2); box-shadow: 0 14px 40px rgba(124,58,237,0.12); }
        .kpi .kpi-lbl { font-size: 11px; font-weight: 600; color: var(--texto3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        .kpi .kpi-val { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1; }
        .kpi .kpi-sub { font-size: 12px; color: var(--texto2); margin-top: 6px; }
        .kpi.purple .kpi-val { color: var(--accent3); }
        .kpi.teal   .kpi-val { color: var(--teal); }
        .kpi.green  .kpi-val { color: var(--green); }
        .kpi.amber  .kpi-val { color: var(--amber); }
        .kpi.red    .kpi-val { color: var(--red); }

        /* ---- CARDS ANÁLISIS ---- */
        .acard {
            background: var(--bg3);
            border: 1px solid var(--borde);
            border-radius: 14px; padding: 22px;
            transition: border-color 0.2s, background 0.3s;
        }
        .acard:hover { border-color: var(--borde2); }

        .acard-titulo {
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 700;
            color: var(--texto); margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ---- BARRAS TEMA ---- */
        .tema-bar { margin-bottom: 14px; }
        .tema-bar-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
        .tema-bar-top .tnombre { color: var(--texto); font-weight: 500; }
        .tema-bar-top .tcant   { color: var(--texto2); font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
        .tema-bar-track { height: 7px; background: var(--bg4); border-radius: 4px; overflow: hidden; transition: background 0.3s; }
        .tema-bar-fill  { height: 100%; border-radius: 4px; animation: barGrow 0.9s cubic-bezier(.22,1,.36,1) both; }

        /* ---- CHART ---- */
        .chart-wrap { position: relative; height: 220px; }
        .chart-wrap-tall { position: relative; height: 280px; }

        /* ---- TIMELINE ---- */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .tl-dia {
            display: flex; gap: 0;
            border-bottom: 1px solid var(--borde);
            padding: 10px 0;
            transition: background 0.15s;
        }
        .tl-dia:last-child { border-bottom: none; }
        .tl-dia:hover { background: rgba(124,58,237,0.04); padding-left: 8px; }
        .tl-fecha {
            width: 100px; flex-shrink: 0;
            font-size: 11px; font-family: 'IBM Plex Mono', monospace;
            color: var(--accent3); padding-top: 2px;
        }
        .tl-body { flex: 1; }
        .tl-cant { font-size: 22px; font-weight: 700; color: var(--texto); font-family: 'Syne', sans-serif; }
        .tl-temas { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .tl-chip {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: rgba(124,58,237,0.12); color: var(--accent3);
            border: 1px solid rgba(124,58,237,0.2);
        }
        .tl-bar {
            height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px; margin-top: 8px;
            animation: barGrow 0.7s ease both;
        }

        /* ---- TIPO PREGUNTA BADGES ---- */
        .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tipo-item {
            background: var(--bg4); border: 1px solid var(--borde);
            border-radius: 10px; padding: 14px;
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; transition: all 0.2s;
        }
        .tipo-item:hover { border-color: var(--borde2); transform: scale(1.03); }
        .tipo-item .tipo-emoji { font-size: 24px; }
        .tipo-item .tipo-nombre { font-size: 11px; color: var(--texto2); font-weight: 600; text-align: center; }
        .tipo-item .tipo-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent3); }
        .tipo-item .tipo-pct { font-size: 10px; color: var(--texto3); font-family: 'IBM Plex Mono', monospace; }

        /* ---- ESTADO ÁNIMO ---- */
        .animo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
        @media(max-width:700px){ .animo-grid{grid-template-columns:1fr 1fr} }
        .animo-item {
            background: var(--bg4); border: 1px solid var(--borde);
            border-radius: 12px; padding: 16px 12px;
            text-align: center; transition: all 0.2s;
        }
        .animo-item:hover { transform: translateY(-4px); }
        .animo-item .ae  { font-size: 26px; margin-bottom: 6px; }
        .animo-item .an  { font-size: 11px; color: var(--texto2); font-weight: 600; margin-bottom: 4px; }
        .animo-item .av  { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
        .animo-frustracion .av { color: var(--red); }
        .animo-confusion   .av { color: var(--amber); }
        .animo-motivacion  .av { color: var(--green); }
        .animo-confianza   .av { color: var(--teal); }

        .animo-muestra {
            font-size: 12px; color: var(--texto2); line-height: 1.6;
            border-left: 2px solid var(--borde2); padding-left: 12px;
            font-style: italic;
            max-height: 140px; overflow-y: auto;
        }
        .animo-muestra::-webkit-scrollbar { width: 3px; }
        .animo-muestra::-webkit-scrollbar-thumb { background: var(--borde2); border-radius: 3px; }

        /* ---- PRIMERA vs ÚLTIMA ---- */
        .sesion-comp {
            display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start;
        }
        .sesion-bloque { background: var(--bg4); border: 1px solid var(--borde); border-radius: 12px; padding: 16px; transition: background 0.3s; }
        .sesion-bloque .sb-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .sesion-bloque.primera .sb-label { color: var(--texto3); }
        .sesion-bloque.ultima  .sb-label { color: var(--accent3); }
        .sb-pregunta {
            font-size: 12px; color: var(--texto2); line-height: 1.6;
            border-left: 2px solid var(--borde); padding-left: 10px;
            margin-bottom: 6px;
        }
        .sesion-bloque.ultima .sb-pregunta { border-left-color: var(--accent); }
        .sesion-arrow {
            display: flex; align-items: center; justify-content: center;
            color: var(--accent2); font-size: 20px; padding-top: 30px;
        }

        /* ---- COMPARATIVA ---- */
        .ranking-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid var(--borde);
            transition: padding-left 0.2s;
        }
        .ranking-item:last-child { border-bottom: none; }
        .ranking-item:hover { padding-left: 8px; }
        .rank-num {
            font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--texto3); width: 20px; flex-shrink: 0; text-align: right;
        }
        .rank-1 .rank-num { color: var(--amber); font-weight: 700; }
        .rank-2 .rank-num { color: var(--texto2); font-weight: 700; }
        .rank-3 .rank-num { color: #cd7f32; font-weight: 700; }
        .rank-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .rank-nombre { flex: 1; font-size: 13px; font-weight: 500; }
        .rank-grupo  { font-size: 11px; color: var(--texto3); }
        .rank-val {
            font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
            color: var(--accent3);
        }
        .rank-bar-wrap { width: 100px; }
        .rank-bar-track { height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; transition: background 0.3s; }
        .rank-bar-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; animation: barGrow 0.8s ease both; }

        /* ---- LOADING ---- */
        .loading-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px; gap: 14px; color: var(--texto2);
        }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--borde); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* ---- EMPTY ---- */
        .empty { text-align: center; padding: 40px; color: var(--texto3); }
        .empty .ei { font-size: 36px; margin-bottom: 10px; }
        .empty p { font-size: 13px; }

        /* ---- SEPARADOR ---- */
        .sep-titulo {
            font-family: 'Syne', sans-serif;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--texto3); margin: 28px 0 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .sep-titulo::after { content: ''; flex: 1; height: 1px; background: var(--borde); }

        /* ---- SCROLL PERSONALIZADO ---- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 3px; }
    </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
    <div class="topbar-left">
        <div class="logo-mark">IA</div>
        <div class="topbar-title">
            <h1>Análisis Pedagógico</h1>
            <p>Tutor POO — Tecnológico Superior de Jalisco</p>
        </div>
    </div>
    <div class="topbar-right">
        <div class="modo-badge" id="modo-badge">
            <div class="dot"></div>
            <span id="modo-label">Cargando...</span>
        </div>

        <!-- BOTÓN TEMA CLARO / OSCURO -->
        <button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Cambiar tema">
            <!-- Sol (se muestra en tema oscuro) -->
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Luna (se muestra en tema claro) -->
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>

        <a href="/admin" class="btn-back">← Volver al panel</a>
    </div>
</header>

<!-- SELECTOR MODO -->
<div class="content">
    <div class="selector-bar">
        <button class="sel-btn" id="btn-global" onclick="setModo('global')">🌐 Análisis Global</button>
        <button class="sel-btn" id="btn-individual" onclick="setModo('individual')">👤 Análisis Individual</button>
    </div>

    <!-- SELECTOR ALUMNO (solo individual) -->
    <div class="alumno-selector" id="alumno-selector" style="display:none">
        <label>Selecciona un alumno para analizar</label>
        <select id="alumno-select" onchange="cargarIndividual()">
            <option value="">— Elige un alumno —</option>
        </select>
    </div>

    <!-- PANEL GLOBAL -->
    <div class="analisis-panel" id="panel-global">
        <div class="loading-panel" id="loading-global">
            <div class="spinner"></div><span>Cargando datos globales...</span>
        </div>
        <div id="contenido-global"></div>
    </div>

    <!-- PANEL INDIVIDUAL -->
    <div class="analisis-panel" id="panel-individual">
        <div class="empty" id="empty-individual">
            <div class="ei">👤</div>
            <p>Selecciona un alumno para ver su análisis</p>
        </div>
        <div class="loading-panel" id="loading-individual" style="display:none">
            <div class="spinner"></div><span>Analizando datos del alumno...</span>
        </div>
        <div id="contenido-individual"></div>
    </div>
</div>

<script>
// ======================================
// TEMA CLARO / OSCURO
// ======================================
function toggleTema() {
    const html = document.documentElement;
    const esClaro = html.classList.toggle('light');
    localStorage.setItem('tema-poo', esClaro ? 'light' : 'dark');

    // Actualizar colores de las gráficas Chart.js al cambiar tema
    Object.values(chartInstances).forEach(chart => {
        if (!chart) return;
        const tickColor = esClaro ? '#4b5563' : '#4b5563';
        const gridColor = esClaro ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.04)';
        const legendColor = esClaro ? '#4b5563' : '#9ca3af';
        if (chart.options.scales?.y) {
            chart.options.scales.y.ticks.color = tickColor;
            chart.options.scales.y.grid.color = gridColor;
        }
        if (chart.options.scales?.x) {
            chart.options.scales.x.ticks.color = tickColor;
        }
        if (chart.options.plugins?.legend?.labels) {
            chart.options.plugins.legend.labels.color = legendColor;
        }
        chart.update();
    });
}

function setModo(modo) {

// ======================================
// UTILIDADES ANÁLISIS
// ======================================
function formatearFecha(str) {
    const [y, m, d] = str.split('-');
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${d} ${meses[parseInt(m)-1]}`;
}

function detectarTipo(pregunta) {
    const p = pregunta.toLowerCase();
    if (p.includes('error') || p.includes('falla') || p.includes('no compila') || p.includes('exception') || p.includes('bug'))
        return 'error';
    if (p.includes('ejemplo') || p.includes('código') || p.includes('codigo') || p.includes('escribe') || p.includes('programa'))
        return 'codigo';
    if (p.includes('ejercicio') || p.includes('práctica') || p.includes('practica') || p.includes('tarea') || p.includes('problema'))
        return 'practica';
    return 'conceptual';
}

function detectarAnimo(pregunta) {
    const p = pregunta.toLowerCase();
    if (p.includes('no entiendo') || p.includes('no comprendo') || p.includes('no sé') || p.includes('no se') ||
        p.includes('confuso') || p.includes('confundido') || p.includes('qué significa') || p.includes('que significa'))
        return 'confusion';
    if (p.includes('no puedo') || p.includes('imposible') || p.includes('no sirve') || p.includes('odio') ||
        p.includes('frustrado') || p.includes('no funciona') || p.includes('siempre falla'))
        return 'frustracion';
    if (p.includes('quiero aprender') || p.includes('quiero saber') || p.includes('me interesa') ||
        p.includes('puedo') || p.includes('quiero practicar') || p.includes('dame un ejercicio'))
        return 'motivacion';
    if (p.includes('ya entendí') || p.includes('ya entendi') || p.includes('gracias') ||
        p.includes('funciona') || p.includes('logré') || p.includes('logre') || p.includes('perfecto'))
        return 'confianza';
    return null;
}

function agruparPorDia(preguntas) {
    const g = {};
    preguntas.forEach(p => {
        const dia = p.fecha.split(' ')[0];
        if (!g[dia]) g[dia] = [];
        g[dia].push(p);
    });
    return g;
}

function contarTemas(preguntas) {
    const c = {};
    preguntas.forEach(p => { c[p.tema] = (c[p.tema] || 0) + 1; });
    return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}

function contarTipos(preguntas) {
    const c = {conceptual:0, codigo:0, error:0, practica:0};
    preguntas.forEach(p => { const t = detectarTipo(p.pregunta); c[t]++; });
    return c;
}

function contarAnimos(preguntas) {
    const c = {frustracion:0, confusion:0, motivacion:0, confianza:0};
    preguntas.forEach(p => { const a = detectarAnimo(p.pregunta); if(a) c[a]++; });
    return c;
}

function getChartColors() {
    const esClaro = document.documentElement.classList.contains('light');
    return {
        tickColor:   esClaro ? '#6b7280' : '#4b5563',
        gridColor:   esClaro ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.04)',
        legendColor: esClaro ? '#4b5563' : '#9ca3af',
        borderColor: esClaro ? '#f0effe' : '#0a0a0f'
    };
}

function initChart(id, type, data, options) {
    if (chartInstances[id]) chartInstances[id].destroy();
    const canvas = document.getElementById(id);
    if (!canvas) return;
    chartInstances[id] = new Chart(canvas, { type, data, options });
}

            <div class="acard">
                <div class="acard-titulo">📊 Gráfica de tipos</div>
                <div class="chart-wrap"><canvas id="chartTiposInd"></canvas></div>
            </div>
        </div>

        <div class="sep-titulo">Progresión — Primera vs Última sesión</div>
        <div class="acard grid-1">
            <div class="acard-titulo">🔬 Evolución de las preguntas en el tiempo</div>
            <div class="sesion-comp">
                <div class="sesion-bloque primera">
                    <div class="sb-label">Primera sesión · ${primerDia ? formatearFecha(primerDia) : '—'}</div>
                    ${primera.map(p=>`<div class="sb-pregunta">${p.pregunta.slice(0,100)}${p.pregunta.length>100?'…':''}</div>`).join('')}
                </div>
                <div class="sesion-arrow">→</div>
                <div class="sesion-bloque ultima">
                    <div class="sb-label">Sesión más reciente · ${ultimoDia ? formatearFecha(ultimoDia) : '—'}</div>
                    ${ultima.map(p=>`<div class="sb-pregunta">${p.pregunta.slice(0,100)}${p.pregunta.length>100?'…':''}</div>`).join('')}
                </div>
            </div>
        </div>

        <div class="sep-titulo">Estado de ánimo detectado</div>
        <div class="acard grid-1">
            <div class="acard-titulo">💬 Señales emocionales en el texto de sus preguntas</div>
            <div class="animo-grid">
                <div class="animo-item animo-frustracion"><div class="ae">😤</div><div class="an">Frustración</div><div class="av">${animos.frustracion}</div></div>
                <div class="animo-item animo-confusion"><div class="ae">😕</div><div class="an">Confusión</div><div class="av">${animos.confusion}</div></div>
                <div class="animo-item animo-motivacion"><div class="ae">🚀</div><div class="an">Motivación</div><div class="av">${animos.motivacion}</div></div>
                <div class="animo-item animo-confianza"><div class="ae">😊</div><div class="an">Confianza</div><div class="av">${animos.confianza}</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
                ${['frustracion','confusion','motivacion','confianza'].map(a=>`
                    <div>
                        <div style="font-size:11px;font-weight:600;color:var(--texto3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">${a}</div>
                        <div class="animo-muestra">${muestras[a].length ? muestras[a].map(q=>`"${q.slice(0,90)}${q.length>90?'…':''}"<br>`).join('') : 'Sin señales detectadas.'}</div>
                    </div>`).join('')}
            </div>
        </div>
    `;

    const c = getChartColors();

    initChart('chartTemasInd', 'polarArea', {
        labels: temas.map(t=>t[0]),
        datasets:[{data:temas.map(t=>t[1]),backgroundColor:COLORES.slice(0,temas.length).map(c=>c+'aa'),borderColor:COLORES.slice(0,temas.length),borderWidth:1}]
    }, { responsive:true, maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{color:c.legendColor,font:{size:10},padding:8}}},
        scales:{r:{ticks:{color:c.tickColor,backdropColor:'transparent'},grid:{color:c.gridColor}}},
        animation:{duration:900} });

    initChart('chartTiposInd', 'bar', {
        labels: ['Conceptual','Código','Error/Debug','Práctica'],
        datasets:[{data:[tipos.conceptual,tipos.codigo,tipos.error,tipos.practica],
            backgroundColor:['#7c3aed','#06b6d4','#ef4444','#10b981'],borderRadius:8,barThickness:36}]
    }, { responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:c.tickColor},grid:{color:c.gridColor}},
                x:{ticks:{color:c.tickColor},grid:{display:false}}},
        animation:{duration:800} });
}
</script>
</body>
</html>
